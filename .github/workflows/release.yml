name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: agent-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-windows-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz agent
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/agent.exe" -DestinationPath "${{ matrix.artifact }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-linux-x86_64/agent-linux-x86_64.tar.gz
            agent-linux-aarch64/agent-linux-aarch64.tar.gz
            agent-macos-x86_64/agent-macos-x86_64.tar.gz
            agent-macos-aarch64/agent-macos-aarch64.tar.gz
            agent-windows-x86_64/agent-windows-x86_64.zip
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p agent-code-lib --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30  # Wait for crates.io to index the lib crate
      - run: cargo publish -p agent-code --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Update version from tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
